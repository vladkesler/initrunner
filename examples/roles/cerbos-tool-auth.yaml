apiVersion: initrunner/v1
kind: Agent
metadata:
  name: cerbos-tool-auth
  description: Multi-tool assistant with Cerbos identity-based tool authorization
  tags: [example, security, cerbos, authorization]
  author: InitRunner Team
  version: "1.0.0"

# This role demonstrates Cerbos tool-level authorization. When enabled,
# each tool call is checked against Cerbos policies using the requesting
# user's identity (from JWT or anonymous principal).
#
# Required environment variables:
#   INITRUNNER_CERBOS_ENABLED=true
#   INITRUNNER_CERBOS_TOOL_CHECKS=true
#   INITRUNNER_JWT_SECRET=<your-secret>
#
# Deploy examples/policies/tool_policy.yaml to your Cerbos PDP.
# Without it, Cerbos will DENY all tool calls.
#
# Role mapping (from tool_policy.yaml):
#   admin     -> all tools allowed
#   operator  -> all tools except shell and python
#   anonymous -> datetime, search, web_reader only

spec:
  role: |
    You are a research assistant with access to web search, file browsing,
    a Python sandbox, and shell access. Use the appropriate tool for each
    task. If a tool call is denied by policy, inform the user which tool
    was blocked and suggest alternatives.
  model:
    provider: openai
    name: gpt-5-mini
    temperature: 0.2
    max_tokens: 4096
  tools:
    # Safe tools -- allowed for all roles including anonymous
    - type: datetime
    - type: search
    - type: web_reader

    # Operator-level tools -- blocked for anonymous users
    - type: filesystem
      root_path: ./data
      read_only: true
    - type: git
      read_only: true

    # Admin-only tools -- blocked for operator and anonymous
    - type: python
      require_confirmation: true
    - type: shell
      working_dir: .
      require_confirmation: true
      # fnmatch permissions layer (evaluated before Cerbos, local/cheap)
      permissions:
        default: deny
        allow:
          - "command=ls *"
          - "command=cat *"
          - "command=grep *"
          - "command=find *"
          - "command=wc *"
        deny:
          - "command=rm *"
          - "command=sudo *"
  security:
    content:
      max_prompt_length: 10000
      max_output_length: 20000
    server:
      cors_origins:
        - "https://app.example.com"
      max_conversations: 200
    rate_limit:
      requests_per_minute: 60
      burst_size: 10
    tools:
      allow_subprocess: false
      allow_eval_exec: false
      block_private_ips: true
  guardrails:
    max_tokens_per_run: 20000
    max_tool_calls: 20
    timeout_seconds: 120
