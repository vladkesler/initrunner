apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "tool"
  rules:
    # Admins can use all tools
    - actions: ["execute"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    # Operators can use all tools except shell and python
    - actions: ["execute"]
      roles: ["operator"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '!(request.resource.attr.tool_type in ["shell", "python"])'

    # Anonymous users (API-key auth) get safe tools only
    - actions: ["execute"]
      roles: ["anonymous"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: request.resource.attr.tool_type in ["datetime", "search", "web_reader"]

    # Block specific API instance for non-admins
    - actions: ["execute"]
      roles: ["operator"]
      effect: EFFECT_DENY
      condition:
        match:
          expr: >-
            request.resource.attr.instance == "internal-api" &&
            request.resource.attr.tool_type == "api"
