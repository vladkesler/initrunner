# Cerbos resource policy for InitRunner daemon processes.
#
# Controls who can start, stop, and connect to daemon agents.

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "daemon"
  rules:
    - actions: ["execute", "write"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    - actions: ["execute"]
      roles: ["operator"]
      effect: EFFECT_ALLOW
