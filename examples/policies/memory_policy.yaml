# Cerbos resource policy for InitRunner memory and document stores.
#
# Controls who can read, modify, and delete agent memories and
# ingested documents.

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "memory"
  rules:
    - actions: ["read", "write", "delete"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    - actions: ["read"]
      roles: ["operator", "viewer"]
      effect: EFFECT_ALLOW

---

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "ingest"
  rules:
    - actions: ["read", "execute"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    - actions: ["read", "execute"]
      roles: ["operator"]
      effect: EFFECT_ALLOW

    - actions: ["read"]
      roles: ["viewer"]
      effect: EFFECT_ALLOW
