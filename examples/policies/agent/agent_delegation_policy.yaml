---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: default
  resource: agent
  importDerivedRoles:
    - agent_derived_roles
  rules:
    # Trusted agents can delegate to any other agent
    - actions: ["delegate"]
      effect: EFFECT_ALLOW
      derivedRoles: ["trusted_agent"]

    # Same-team agents can delegate to each other
    - actions: ["delegate"]
      effect: EFFECT_ALLOW
      derivedRoles: ["same_team"]

    # Deny delegation to agents tagged "privileged" (unless trusted)
    - actions: ["delegate"]
      effect: EFFECT_DENY
      roles: ["agent"]
      condition:
        match:
          expr: request.resource.attr.tags.exists(t, t == "privileged")
