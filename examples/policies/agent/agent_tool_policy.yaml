---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: default
  resource: tool
  importDerivedRoles:
    - agent_derived_roles
  rules:
    # All agents can execute safe tool types
    - actions: ["execute"]
      effect: EFFECT_ALLOW
      roles: ["agent"]
      condition:
        match:
          expr: >-
            request.resource.attr.tool_type in
            ["datetime", "search", "web_reader", "http", "retrieval",
             "memory_store", "delegate", "api", "web_scraper"]

    # Trusted agents get all tools (including shell/python)
    - actions: ["execute"]
      effect: EFFECT_ALLOW
      derivedRoles: ["trusted_agent"]

    # Deny shell and python tools to non-trusted agents only
    - actions: ["execute"]
      effect: EFFECT_DENY
      roles: ["agent"]
      condition:
        match:
          all:
            of:
              - expr: >-
                  request.resource.attr.tool_type in ["shell", "python"]
              - expr: >-
                  !request.principal.attr.tags.exists(t, t == "trusted")
