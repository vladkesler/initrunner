# Strict agent policy -- production, external-facing environments.
#
# - Admin: full access
# - Operator: read all; execute own agents only (via agent_owner derived role)
# - Viewer/anonymous: denied

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "agent"
  importDerivedRoles:
    - initrunner_roles
  rules:
    # Admins have full access
    - actions: ["read", "write", "execute"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    # Operators can read all agents
    - actions: ["read"]
      roles: ["operator"]
      effect: EFFECT_ALLOW

    # Agent owners (operators who authored the agent) can execute
    - actions: ["execute"]
      derivedRoles: ["agent_owner"]
      effect: EFFECT_ALLOW
