# Team ingest policy -- admin full access, team members can read.

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "ingest"
  importDerivedRoles:
    - initrunner_roles
  rules:
    - actions: ["read", "execute"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    - actions: ["read"]
      derivedRoles: ["team_member"]
      effect: EFFECT_ALLOW

    - actions: ["read", "execute"]
      roles: ["operator"]
      effect: EFFECT_ALLOW
