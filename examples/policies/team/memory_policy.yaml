# Team memory policy -- admin full access, team members can read.

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "memory"
  importDerivedRoles:
    - initrunner_roles
  rules:
    - actions: ["read", "write", "delete"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    - actions: ["read"]
      derivedRoles: ["team_member"]
      effect: EFFECT_ALLOW

    - actions: ["read"]
      roles: ["operator"]
      effect: EFFECT_ALLOW
