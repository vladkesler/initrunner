# Team-based agent policy -- multi-team organizations.
#
# - Admin: full access everywhere
# - team_admin: write on team agents
# - agent_owner: read, write, execute own agents
# - team_member: read, execute team agents
# - Operator: read all agents

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "agent"
  importDerivedRoles:
    - initrunner_roles
  rules:
    # Admins have full access
    - actions: ["read", "write", "execute"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    # Team admins can write team agents
    - actions: ["read", "write", "execute"]
      derivedRoles: ["team_admin"]
      effect: EFFECT_ALLOW

    # Agent owners can read, write, and execute own agents
    - actions: ["read", "write", "execute"]
      derivedRoles: ["agent_owner"]
      effect: EFFECT_ALLOW

    # Team members can read and execute team agents
    - actions: ["read", "execute"]
      derivedRoles: ["team_member"]
      effect: EFFECT_ALLOW

    # Operators can read all agents
    - actions: ["read"]
      roles: ["operator"]
      effect: EFFECT_ALLOW
