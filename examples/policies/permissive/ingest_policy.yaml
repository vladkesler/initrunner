# Permissive ingest policy -- broad access for admin, operator, viewer.

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "ingest"
  rules:
    - actions: ["read", "execute"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    - actions: ["read", "execute"]
      roles: ["operator"]
      effect: EFFECT_ALLOW

    - actions: ["read"]
      roles: ["viewer"]
      effect: EFFECT_ALLOW
