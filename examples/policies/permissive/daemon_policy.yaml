# Permissive daemon policy -- admin and operator can manage daemons.

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "daemon"
  rules:
    - actions: ["execute", "write"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    - actions: ["execute"]
      roles: ["operator"]
      effect: EFFECT_ALLOW
