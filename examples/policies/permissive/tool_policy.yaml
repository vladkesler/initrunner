# Permissive tool policy -- all tools except shell/python for operators.

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "tool"
  rules:
    # Admins can use all tools
    - actions: ["execute"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    # Operators can use all tools except shell and python
    - actions: ["execute"]
      roles: ["operator"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: '!(request.resource.attr.tool_type in ["shell", "python"])'

    # Viewers get safe tools
    - actions: ["execute"]
      roles: ["viewer"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: >-
            request.resource.attr.tool_type in
            ["datetime", "search", "web_reader"]

    # Anonymous users get safe tools
    - actions: ["execute"]
      roles: ["anonymous"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: >-
            request.resource.attr.tool_type in
            ["datetime", "search", "web_reader"]
