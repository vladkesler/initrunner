# Cerbos resource policy for InitRunner ingestion pipeline.
#
# Controls who can read and trigger document ingestion jobs.

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "ingest"
  rules:
    - actions: ["read", "execute"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    - actions: ["read", "execute"]
      roles: ["operator"]
      effect: EFFECT_ALLOW

    - actions: ["read"]
      roles: ["viewer"]
      effect: EFFECT_ALLOW
