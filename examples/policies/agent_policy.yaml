# Cerbos resource policy for InitRunner agents.
#
# Controls who can list, view, run, and edit agent roles via the
# dashboard API and OpenAI-compatible server.
#
# Usage:
#   docker run --rm -p 3593:3593 \
#     -v ./examples/policies:/policies \
#     ghcr.io/cerbos/cerbos:latest

apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: "agent"
  rules:
    # Admins have full access
    - actions: ["read", "write", "execute"]
      roles: ["admin"]
      effect: EFFECT_ALLOW

    # Operators can read and run agents but not edit
    - actions: ["read", "execute"]
      roles: ["operator"]
      effect: EFFECT_ALLOW

    # Viewers are read-only
    - actions: ["read"]
      roles: ["viewer"]
      effect: EFFECT_ALLOW

    # Anonymous users (API-key auth without JWT) get read-only
    - actions: ["read"]
      roles: ["anonymous"]
      effect: EFFECT_ALLOW

    # Trigger users (Telegram, Discord, webhooks) can run public agents
    - actions: ["execute"]
      roles: ["trigger_user"]
      effect: EFFECT_ALLOW
      condition:
        match:
          expr: request.resource.attr.tags.exists(t, t == "public")
