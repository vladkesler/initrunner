name: Security

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "dashboard/package.json"
      - "dashboard/pnpm-lock.yaml"
      - "Dockerfile"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 6 * * 3" # Wednesday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-repo:
    name: Trivy repository scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-repo.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-repo.sarif"
          category: "trivy-repo"

  pip-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - name: Export requirements
        run: uv export --no-hashes --no-dev -o /tmp/requirements.txt

      - name: Audit Python dependencies
        run: uvx pip-audit -r /tmp/requirements.txt --ignore-vuln CVE-2025-69872 --ignore-vuln CVE-2026-4539

  frontend-audit:
    name: Frontend dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable
        working-directory: dashboard

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: dashboard

      - name: Audit frontend dependencies
        run: pnpm audit --prod
        working-directory: dashboard
        continue-on-error: true
