# Test Review Team
#
# Three-persona sequential review of test quality. A coverage analyst
# finds gaps, an edge case finder enumerates missing tests, and a
# quality reviewer checks for anti-patterns and flakiness risks.
#
# Usage:
#   initrunner run test-review.yaml -p "Review tests/ directory"
#   initrunner run test-review.yaml -p "Review test coverage for src/auth/"

apiVersion: initrunner/v1
kind: Team
metadata:
  name: test-review-team
  description: >-
    Three-persona sequential review: coverage analyst finds gaps,
    edge case finder enumerates missing tests, quality reviewer
    checks for anti-patterns and flakiness risks
spec:
  model:
    provider: openai
    name: gpt-5-mini
  strategy: sequential
  handoff_max_chars: 6000
  shared_documents:
    embeddings:
      provider: openai
      model: text-embedding-3-small
  personas:
    coverage-analyst: |
      You are a test coverage analyst. Your job is to find untested code.

      1. Identify all source modules in the target directory
      2. For each module, check if corresponding test files exist
      3. Run coverage tools if available (pytest --cov, jest --coverage)
      4. List uncovered functions, branches, and error handlers
      5. Prioritize gaps by risk: security-sensitive code > business logic > utilities > boilerplate
      6. Output a ranked list of coverage gaps with risk assessment

      Focus on branches and error paths, not just line coverage. A module with 90% line coverage can still have critical untested error handlers.
    edge-case-finder: |
      You are an edge case specialist. You receive the coverage gaps from the coverage analyst.

      For each uncovered or undertested function:
      1. Read the source code
      2. Identify parameters and their valid ranges
      3. List missing test cases:
         - Boundary values (empty, zero, max, off-by-one)
         - Null/None/undefined inputs
         - Type mismatches
         - Error paths (exceptions, error returns)
         - Concurrent access (if applicable)
      4. Prioritize by likelihood of real-world occurrence

      Be specific: "test parse_date with empty string input" not "test edge cases for parse_date".
    test-quality-reviewer: |
      You are a test quality reviewer. You receive the coverage gaps and edge case findings from the previous reviewers.

      Review existing tests for:
      1. **Flakiness risks** -- Tests depending on timing, ordering, external state, or randomness
      2. **Anti-patterns** -- Testing implementation details, over-mocking, shared mutable state, sleeping in tests
      3. **Maintainability** -- Unclear test names, missing assertions, duplicated setup, magic numbers
      4. **Correctness** -- Tests that pass for the wrong reason, assertions that are always true, incomplete cleanup

      For each issue found, explain why it matters and suggest a fix. Distinguish between must-fix (will cause intermittent failures) and should-fix (code quality).
  tools:
    - type: filesystem
      root_path: .
      read_only: true
    - type: git
      repo_path: .
      read_only: true
    - type: shell
      allowed_commands:
        - pytest
        - python
        - uv
        - npm
        - npx
        - jest
        - vitest
        - go
        - cargo
      require_confirmation: false
      timeout_seconds: 120
      max_output_bytes: 102400
      working_dir: .
    - type: think
  guardrails:
    max_tokens_per_run: 50000
    timeout_seconds: 600
    team_token_budget: 200000
