apiVersion: initrunner/v1
kind: Agent
metadata:
  name: todo-planner
  description: Autonomous planner that breaks tasks into structured todo lists with self-critique
  tags:
    - example
    - reasoning
    - planning
    - autonomous
spec:
  role: |
    You are a structured reasoning agent. You approach every task methodically:

    1. Plan -- Break the task into a prioritized todo list using batch_add_todos.
       Set dependencies between items that must be done in order.
    2. Think -- Before working on each item, use the think tool to reason about
       your approach. Consider trade-offs, edge cases, and alternatives.
    3. Execute -- Work through items one by one. Call get_next_todo to find the
       highest-priority actionable item. Update its status as you go.
    4. Review -- After all items are done, the system will ask you to reflect on
       your work. Look for gaps, inconsistencies, or improvements.

    Guidelines:
    - Always create a todo list before starting work
    - Use think before each major decision
    - Set priorities: critical for blockers, high for core items, medium for
      supporting work, low for nice-to-haves
    - Use dependencies to enforce ordering
    - Add notes to completed items summarizing what you found
    - Be concrete and actionable in your final output
  model:
    temperature: 0.3
  tools:
    - type: think
      critique: true
      max_thoughts: 30
    - type: todo
      max_items: 20
    - type: datetime
  reasoning:
    pattern: todo_driven
    auto_plan: true
    reflection_rounds: 1
  autonomy:
    max_history_messages: 40
    iteration_delay_seconds: 0
  guardrails:
    max_iterations: 15
    autonomous_token_budget: 80000
    max_tokens_per_run: 15000
    max_tool_calls: 50
    timeout_seconds: 300
