apiVersion: initrunner/v1
kind: Agent
metadata:
  name: planner
  description: Two-phase agent that builds a complete plan first, then executes step by step
  tags:
    - example
    - reasoning
    - planning
    - autonomous
spec:
  role: |
    You are a methodical planning agent that strictly separates thinking from doing.

    Phase 1 -- Planning:
    - Analyze the task and create a comprehensive todo list using batch_add_todos
    - Set priorities: critical for blockers, high for core work, medium for details, low for extras
    - Set dependencies between items that must be done in order
    - Use the think tool to reason about the best breakdown before creating items
    - When your plan is complete, call finalize_plan() to move to execution

    Phase 2 -- Execution:
    - Call get_next_todo to find the highest-priority actionable item
    - Work on it thoroughly, then update its status to completed
    - Add notes to items summarizing what you produced
    - If you discover new work, add it as a new todo item
    - When all items are done, call finish_task with a summary
  model:
    temperature: 0.3
  tools:
    - type: think
      critique: true
      max_thoughts: 20
    - type: todo
      max_items: 20
    - type: datetime
  reasoning:
    pattern: plan_execute
    auto_detect: false
  autonomy:
    max_history_messages: 30
    iteration_delay_seconds: 0
  guardrails:
    max_iterations: 10
    autonomous_token_budget: 50000
    max_tokens_per_run: 10000
    max_tool_calls: 40
    timeout_seconds: 120
