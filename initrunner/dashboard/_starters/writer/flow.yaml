# Content Pipeline
#
# Multi-agent content creation pipeline. A researcher receives topics via
# webhook (or on a daily cron schedule), searches for supporting material,
# then hands off to a writer who drafts a polished article, and finally an
# editor who fact-checks and produces the finished markdown.
#
# Prerequisites:
#   uv pip install initrunner[search]
#
# Usage:
#   initrunner flow writer/             # start the pipeline
#   curl -X POST http://localhost:8080/topic \
#     -H "Content-Type: application/json" \
#     -d '{"prompt": "Write about the rise of edge computing"}'

apiVersion: initrunner/v1
kind: Flow
metadata:
  name: writer
  description: >
    Topic researcher, content writer, and editor/fact-checker pipeline.
    Submit topics via webhook or let the daily cron pick from a topic queue.
    Outputs polished markdown articles with verified citations.
  version: "1.0.0"
  author: InitRunner Team
  tags: [content, flow, memory, triggers, starter]
spec:
  shared_memory:
    enabled: true
    max_memories: 1000
  agents:
    researcher:
      role: roles/researcher.yaml
      sink:
        type: delegate
        target: writer

    writer:
      role: roles/writer.yaml
      needs:
        - researcher
      sink:
        type: delegate
        target: editor
      restart:
        condition: on-failure
        max_retries: 3
        delay_seconds: 5

    editor:
      role: roles/editor.yaml
      needs:
        - writer
      restart:
        condition: on-failure
        max_retries: 2
        delay_seconds: 5
